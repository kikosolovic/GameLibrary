{% load static %}
<link rel="stylesheet" href="{% static 'css/game-detail.css' %}">

<div class="book-overlay">
  <div class="open-book">

    <!-- Spine -->
    <div class="book-spine"></div>

    <!-- LEFT PAGE -->
    <div class="book-page-left">
      <div class="page-lines"></div>

      <!-- Game Cover -->
      <img 
        src="{{ game.image }}" 
        alt="{{ game.name }}" 
        class="game-cover"
        onerror="this.onerror=null; this.src='{{ game.fallback_image }}';"
      >

    </div>

    <!-- RIGHT PAGE -->
    <div class="book-page-right">
      <div class="page-lines"></div>

      <!-- Close button -->
      <div class="close-bookmark" title="Close">×</div>

      <!-- GAME TITLE -->
      <h1 class="game-title">{{ game.name }}</h1>

      <!-- META -->
      <div class="game-meta">
        <span class="meta-badge">{{ game.genre|default:"Unknown genre" }}</span>
      </div>

      <!-- DESCRIPTION -->
      <div class="game-description">
        {% if game.description %}
          {{ game.description }}
        {% else %}
          No description available.
        {% endif %}
      </div>

      <!-- ACTIONS -->
      <div class="game-actions">
        {% if request.session.user_id %}
          <button class="action-button">Add to Favorites ❤️</button>
          <button class="action-button secondary">Mark as Played ✓</button>
        {% else %}
          <p><a href="{% url 'login' %}">Log in</a> to save games.</p>
        {% endif %}
      </div>
    </div>

  </div>
</div>

<script>
(function () {
  document.body.classList.add('book-open');

  const scrollbarWidth = window.innerWidth - document.documentElement.clientWidth;
  if (scrollbarWidth > 0) {
    document.body.style.paddingRight = scrollbarWidth + 'px';
  }

  const overlay = document.querySelector('.book-overlay');
  if (overlay) {
    overlay.offsetHeight;
    overlay.classList.add('is-visible');
  }

  function cleanupAndGo(url) {
    if (overlay) overlay.classList.remove('is-visible');
    setTimeout(() => {
      document.body.classList.remove('book-open');
      document.body.style.paddingRight = '';
      window.location.href = url;
    }, 180);
  }

  document.querySelector('.close-bookmark').addEventListener('click', () => {
    cleanupAndGo("{% url 'library' %}");
  });

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) {
      cleanupAndGo("{% url 'library' %}");
    }
  });
})();
</script>
