{% extends 'base.html' %}
{% load static %}

{% block title %}Sign Up{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/form.css' %}">
{% endblock %}

{% block content %}
<div class="main">
    <h1>Sign Up</h1>
    <form>
        <input type="text" id="username" name="username" placeholder="Username" required>

        <input type="password" id="password1" name="password" placeholder="Password" required oninput="validatePasswords()">
        
        <input type="password" id="password2" name="password2" placeholder="Repeat Password" required oninput="validatePasswords()">
        
        <select name="genre" id="genre" required>
            <option value="" disabled selected>Select favorite game genre</option>
            <option value="action">Action</option>
            <option value="adventure">Adventure</option>
            <option value="rpg">RPG</option>
            <option value="strategy">Strategy</option>
            <option value="sports">Sports</option>
        </select>

        <select name="gender" id="gender" required>
            <option value="" disabled selected>Select your gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">No other genders</option>
        </select>

        <div class="wrap">            
            <button class="button1" onclick="validatePasswords()" type="submit">Sign Up</button>
        </div>
        <p id="error-message"></p>
    </form>
    <p>Already have an Account? <a href="{% url 'login' %}">Log in here</a></p>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/script.js' %}"></script>
{% endblock %}
