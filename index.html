<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Library</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="library-background">
    <!-- Header with controls -->
    <header class="library-header">
      <div class="search-bar">
        <input type="text" placeholder="Search...">
      </div>
      <div class="shelf-button">Algo</div>
      <div class="shelf-button">Filter</div>
      <div class="shelf-button">...</div>
      <div class="user-row">
        <button class="shelf-button-logout">Log out</button>
        <div class="username-picture">
          <img src="Assets/bubly.png" alt="">
        </div>
      </div>
    </header>

    <!-- Scrollable content -->
    <main class="library-content">
      <div class="shelf"></div>
      <div class="shelf"></div>
      <div class="shelf"></div>
      <div class="shelf"></div>
      <div class="shelf"></div>
    </main>
  </div>
</body>
</html>
